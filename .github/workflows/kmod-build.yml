name: build-kmod
on:
  pull_request:
    paths:
      - "Containerfile.kmod"
      - "versions/workstation/kmod.sh"
      - ".github/workflows/kmod-build.yml"
  merge_group:
  schedule:
    - cron: "0 2 * * *" # 2 am, ahead of the workstation build
  workflow_dispatch:
env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-push-kmod:
    name: Build and push kmod image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        image_name: [ kmod ]
        major_version: [ 43 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Matrix Variables
        run: |
          echo "MAJOR_VERSION=${{ matrix.major_version }}" >> $GITHUB_ENV
          echo "BASE_IMAGE=quay.io/fedora/fedora-bootc" >> $GITHUB_ENV
          echo "IMAGE_NAME=${{ matrix.image_name }}" >> $GITHUB_ENV

      - name: Build Image
        id: build_image
        run: |
          set -ouex pipefail

          podman build \
            --build-arg MAJOR_VERSION=${{ env.MAJOR_VERSION }} \
            --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} \
            --secret id=mok_priv_b64,env=MOK_PRIV_B64 \
            -t ${{ env.IMAGE_NAME }}:build \
            -f ./Containerfile.kmod \
            .

          # Scratch image has no shell, so use create+cp to read the kver file
          CID=$(podman create ${{ env.IMAGE_NAME }}:build)
          podman cp "${CID}:/etc/kmod/kver" /tmp/kver
          podman rm "${CID}"
          KERNEL_VER=$(cat /tmp/kver)
          TIMESTAMP="$(date +%Y%m%d)"

          TAGS=("${KERNEL_VER}" "${KERNEL_VER}-${TIMESTAMP}" "latest")
          for TAG in "${TAGS[@]}"; do
            podman tag "${{ env.IMAGE_NAME }}:build" "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          done

          echo "image=${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS[*]}" >> $GITHUB_OUTPUT
          echo "kernel_ver=${KERNEL_VER}" >> $GITHUB_OUTPUT
        env:
          MOK_PRIV_B64: ${{ secrets.MOK_PRIV_B64 }}

      - name: Configure sigstore attachments
        run: |
          sudo mkdir -p /etc/containers/registries.d
          sudo cp files/etc/containers/registries.d/toby-st.yaml /etc/containers/registries.d/toby-st.yaml

      - name: Push To GHCR
        id: push
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          set -ouex pipefail
          echo "${{ github.token }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "${KEY_2025_11_B64}" | base64 -d > /tmp/cosign.key

          TAGS=(${{ steps.build_image.outputs.tags }})
          for TAG in "${TAGS[@]}"; do
            sudo podman push \
              --sign-by-sigstore-private-key=/tmp/cosign.key \
              "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          done

          rm -f /tmp/cosign.key

          DIGEST=$(sudo podman inspect --format='{{index .RepoDigests 0}}' \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${TAGS[0]}" \
            | cut -d@ -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
        env:
          KEY_2025_11_B64: ${{ secrets.KEY_2025_11_B64 }}

      - name: Echo outputs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          echo "kernel_ver=${{ steps.build_image.outputs.kernel_ver }}"
          echo "${{ toJSON(steps.push.outputs) }}"
